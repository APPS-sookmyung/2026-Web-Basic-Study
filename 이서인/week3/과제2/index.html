<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cat Facts</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🐱 Cat Facts</h1>

    <div class="controls">
      <select id="language">
        <option value="eng">English</option>
        <option value="kor">한국어</option>
      </select>
      
      <div class="buttons">
        <button id="getFactBtn">Get Random Fact</button>
        <div class="multiple-facts">
          <input type="number" id="factCount" min="1" max="5" value="3" />
          <button id="getMultipleBtn">Get Multiple Facts</button>
        </div>
      </div>
    </div>

    <div id="loading" class="loading hidden">Loading...</div>
    <div id="error" class="error hidden"></div>
    <div id="factContainer" class="facts"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
